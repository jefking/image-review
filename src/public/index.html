<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Review</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #folder-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 10px;
        }
        #folder-select h1 { margin-bottom: 20px; }
        .folder-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            min-width: 200px;
        }
        .folder-btn:hover { background: #555; }
        .resume-btn { background: #2a5a2a; }
        .resume-btn:hover { background: #3a7a3a; }
        #viewer {
            display: none;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        #review-strip {
            display: flex;
            gap: 12px;
            align-items: stretch;
            justify-content: center;
            height: 100vh;
            padding: 14px;
        }
        .photo-frame {
            min-width: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .side-preview {
            flex: 1 1 0;
            height: 100%;
            min-width: 0;
            opacity: 0.58;
        }
        .side-preview.empty {
            visibility: hidden;
        }
        .side-preview.high-rated {
            opacity: 0.78;
        }
        .main-preview {
            aspect-ratio: var(--main-photo-ratio, 1 / 1);
            flex: 0 1 auto;
            height: 100%;
            max-width: 100%;
        }
        #photo,
        .side-photo {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
        }
        .side-meta {
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: rgba(0,0,0,0.68);
            color: rgba(255,255,255,0.82);
            padding: 6px 8px;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
        }
        .side-preview.high-rated .side-meta {
            color: gold;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: min(60vw, 1200px);
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }
        #rating { color: gold; font-size: 18px; }
        #counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        #counter:hover {
            background: rgba(50,50,50,0.9);
        }
        #help {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            opacity: 0.6;
        }
        @media (max-width: 900px) {
            #review-strip {
                padding: 8px;
            }
            .side-preview {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="folder-select">
        <h1>Select Photo Folder</h1>
        <div id="folders"></div>
    </div>
    <div id="viewer">
        <div id="review-strip">
            <div id="prev-preview" class="photo-frame side-preview empty">
                <img id="prev-photo" class="side-photo" src="" alt="">
                <div id="prev-meta" class="side-meta"></div>
            </div>
            <div class="photo-frame main-preview">
                <img id="photo" src="" alt="">
            </div>
            <div id="next-preview" class="photo-frame side-preview empty">
                <img id="next-photo" class="side-photo" src="" alt="">
                <div id="next-meta" class="side-meta"></div>
            </div>
        </div>
        <div id="info">
            <div id="filename"></div>
            <div id="rating"></div>
        </div>
        <div id="counter"></div>
        <div id="help">← prev | → next | ↓ move to low | Esc back</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
